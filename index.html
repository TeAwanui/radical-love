<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">

  <title>Radical Love — Know more. Do more.</title>

  <meta property="og:title"       content="Radical Love">
  <meta property="og:description" content="Your daily dose of civic power. Know the system, share the knowledge, organise with aroha.">

  <meta property="og:locale"      content="en_NZ">

  <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400&display=swap" rel="stylesheet">

  <style>
    /* ── BRIGHT ARCADE x DIETER RAMS ─────────────────────────────────────────
     * Less but better. Every element earns its place.
     * Warm, bright, alive. Chunky. Instant feedback. Fun.
     * ───────────────────────────────────────────────────────────────────── */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      font-family: 'Roboto', sans-serif;
      background: #FFF5E1;
      color: #222;
      height: 100%;
      -webkit-font-smoothing: antialiased;
      overscroll-behavior: none;
    }
    #app {
      width: 100%;
      max-width: 480px;
      margin: 0 auto;
      background: #FFF5E1;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── HEADER ── */
    .hdr { background: #E94560; padding: 0; flex-shrink: 0; text-align: center; position: relative; overflow: hidden; }
    .hdr-video { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; opacity: 0.15; pointer-events: none; }
    .hdr-overlay { position: relative; z-index: 1; padding: 18px 20px 14px; }
    .hdr-wordmark { font-size: 26px; font-weight: 700; color: #fff; letter-spacing: 1px; }
    .hdr-wordmark span { color: #fff; }
    .hdr-tagline { font-size: 10px; font-weight: 500; color: rgba(255,255,255,.8); margin-top: 3px; letter-spacing: 1.5px; text-transform: uppercase; }

    /* ── TABS ── */
    .tabs { display: flex; background: #fff; flex-shrink: 0; position: sticky; top: 0; z-index: 10; border-bottom: 3px solid #FFF5E1; }
    .tab { flex: 1; padding: 12px 2px 10px; border: none; background: none; cursor: pointer; font-family: 'Roboto', sans-serif; font-size: 12px; font-weight: 600; letter-spacing: 0.5px; color: #ccc; border-bottom: 3px solid transparent; transition: all .15s; text-align: center; text-transform: uppercase; }
    .tab:hover { color: #999; }
    .tab.on { color: #E94560; border-bottom-color: #E94560; }

    /* ── SCROLL ── */
    .scr { flex: 1; min-height: 0; overflow-y: auto; -webkit-overflow-scrolling: touch; }
    .scr::-webkit-scrollbar { width: 0; }

    /* ── SHARED ── */
    .lbl { font-size: 10px; font-weight: 700; letter-spacing: 2px; color: #C77737; text-transform: uppercase; margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
    .lbl::after { content: ''; flex: 1; height: 2px; background: #F0E6D3; }
    .sec { padding: 20px 16px 0; }
    .intro { font-size: 13px; font-weight: 400; color: #888; line-height: 1.7; margin-bottom: 16px; }

    /* ── QUOTE HERO ── */
    .quote-hero { background: #111; padding: 16px 18px; border-radius: 12px; margin: 12px 16px 0; }
    .quote-label { font-size: 9px; font-weight: 600; letter-spacing: 2px; color: #E94560; text-transform: uppercase; margin-bottom: 8px; }
    .quote-text { font-size: 15px; font-weight: 300; font-style: italic; color: rgba(255,255,255,.9); line-height: 1.65; margin-bottom: 8px; }
    .quote-attr { font-size: 12px; font-weight: 500; color: rgba(255,255,255,.7); }
    .quote-src { font-size: 10px; font-weight: 300; color: rgba(255,255,255,.35); margin-top: 2px; line-height: 1.4; }
    .quote-footer { display: flex; align-items: center; justify-content: space-between; margin-top: 8px; }

    /* ── ORIGIN BADGES ── */
    .origin { font-size: 8px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; padding: 4px 10px; border-radius: 100px; display: inline-block; }
    .origin.aotearoa { background: #E8F5EE; color: #1B5E3A; }
    .origin.pacific { background: #E3F2FD; color: #1565C0; }
    .origin.indigenous { background: #FFF3E0; color: #E65100; }
    .origin.intl { background: #F5F5F5; color: #888; }

    /* ── SHARE BUTTON ── */
    .share-btn { display: inline-flex; align-items: center; gap: 6px; background: #E94560; border: none; color: #fff; font-family: 'Roboto', sans-serif; font-size: 11px; font-weight: 600; letter-spacing: 0.5px; padding: 9px 18px; border-radius: 100px; cursor: pointer; transition: all .1s; }
    .share-btn:hover { filter: brightness(1.1); }
    .share-btn:active { transform: scale(0.96); }
    .share-btn-outline { background: #fff; border: 2px solid #eee; color: #999; }
    .share-btn-outline:hover { border-color: #E94560; color: #E94560; }

    /* ── BILL CARDS ── */
    .bill-card { padding: 16px; background: #fff; border-radius: 12px; margin-bottom: 8px; }
    .bill-name { font-size: 16px; font-weight: 600; color: #222; line-height: 1.35; margin-bottom: 6px; }
    .bill-meta { display: flex; align-items: center; gap: 6px; margin-bottom: 8px; flex-wrap: wrap; }
    .bill-badge { font-size: 9px; font-weight: 600; letter-spacing: 0.8px; text-transform: uppercase; padding: 4px 10px; border-radius: 100px; white-space: nowrap; }
    .bill-badge.select-committee { background: #FFF3CD; color: #856404; }
    .bill-badge.passed { background: #F8D7DA; color: #721C24; }
    .bill-badge.first-reading { background: #D1ECF1; color: #0C5460; }
    .bill-badge.second-reading { background: #FFE0B2; color: #E65100; }
    .bill-badge.third-reading { background: #C8E6C9; color: #2E7D32; }
    .bill-badge.party { background: #f5f2ed; color: #888; }
    .bill-summary { font-size: 13px; font-weight: 400; color: #555; line-height: 1.75; margin-bottom: 10px; }
    .bill-actions { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    .bill-link { font-size: 11px; font-weight: 500; color: #E94560; text-decoration: none; padding: 6px 14px; border: 1.5px solid #E94560; border-radius: 100px; transition: all .15s; }
    .bill-link:hover { background: #E94560; color: #fff; }

    /* ── TOOLKIT CARDS ── */
    .tk-card { background: #fff; border-radius: 12px; margin-bottom: 8px; overflow: hidden; }
    .tk-header { display: flex; justify-content: space-between; align-items: center; padding: 16px; cursor: pointer; }
    .tk-topic { font-size: 15px; font-weight: 500; color: #222; }
    .tk-emoji { font-size: 20px; margin-right: 10px; }
    .tk-arrow { font-size: 14px; color: #ccc; transition: transform .25s; }
    .tk-arrow.open { transform: rotate(180deg); color: #E94560; }
    .tk-body { display: none; padding: 0 16px 16px; }
    .tk-body.open { display: block; }
    .tk-they-say { font-size: 14px; font-weight: 400; font-style: italic; color: #888; line-height: 1.65; margin-bottom: 14px; padding: 12px 14px; background: #faf7f4; border-radius: 8px; border-left: 3px solid #ddd; }
    .tk-reality-lbl { font-size: 10px; font-weight: 600; letter-spacing: 1.5px; color: #E94560; text-transform: uppercase; margin-bottom: 6px; }
    .tk-reality { font-size: 13px; font-weight: 400; color: #444; line-height: 1.75; margin-bottom: 16px; }
    .tk-stat-box { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); border-radius: 12px; padding: 20px; margin-bottom: 12px; text-align: center; }
    .tk-stat { font-size: 52px; font-weight: 300; color: #fff; letter-spacing: -2px; line-height: 1.1; }
    .tk-stat-ctx { font-size: 13px; font-weight: 400; color: rgba(255,255,255,.8); line-height: 1.5; margin-top: 6px; }
    .tk-source { font-size: 10px; font-weight: 400; color: #aaa; line-height: 1.5; margin-bottom: 10px; }

    /* ── TIRITI ── */
    .tiriti-hero { background: linear-gradient(135deg, #1B4332 0%, #2D6A4F 100%); padding: 28px 24px; border-radius: 16px; margin: 16px 20px 0; }
    .tiriti-hero-lbl { font-size: 10px; font-weight: 500; letter-spacing: 2px; color: #95D5B2; text-transform: uppercase; margin-bottom: 10px; }
    .tiriti-hero-title { font-size: 18px; font-weight: 500; color: #fff; line-height: 1.4; margin-bottom: 6px; }
    .tiriti-hero-sub { font-size: 13px; font-weight: 300; color: rgba(255,255,255,.7); margin-bottom: 12px; }
    .tiriti-hero-body { font-size: 13px; font-weight: 400; color: rgba(255,255,255,.9); line-height: 1.75; }
    .tiriti-hero-src { font-size: 10px; font-weight: 300; color: rgba(255,255,255,.5); margin-top: 10px; }

    .tiriti-article { background: #fff; border-radius: 12px; margin-bottom: 10px; padding: 16px; }
    .tiriti-num { font-size: 10px; font-weight: 600; letter-spacing: 1.5px; color: #1B4332; text-transform: uppercase; margin-bottom: 8px; }
    .tiriti-cols { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
    .tiriti-col-lbl { font-size: 9px; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; color: #aaa; margin-bottom: 4px; }
    .tiriti-text { font-size: 12px; font-weight: 400; color: #555; line-height: 1.7; }
    .tiriti-diff { font-size: 13px; font-weight: 400; color: #333; line-height: 1.75; padding: 12px; background: #FFF8E1; border-radius: 8px; border-left: 3px solid #F9A825; }
    .tiriti-diff strong { font-weight: 500; color: #E65100; }

    /* ── TIMELINE ── */
    .tl-item { padding: 14px 16px; background: #fff; border-radius: 12px; margin-bottom: 8px; }
    .tl-year { font-size: 12px; font-weight: 700; color: #E94560; margin-bottom: 2px; }
    .tl-event { font-size: 14px; font-weight: 500; color: #222; line-height: 1.4; margin-bottom: 4px; }
    .tl-desc { font-size: 12px; font-weight: 400; color: #777; line-height: 1.65; }

    /* ── PARTY SCORECARD ── */
    .party-card { background: #fff; border-radius: 12px; padding: 16px; margin-bottom: 8px; }
    .party-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    .party-name { font-size: 16px; font-weight: 500; color: #222; }
    .party-score-num { font-size: 15px; font-weight: 700; }
    .party-bar { height: 8px; background: #f0ede8; border-radius: 100px; margin-bottom: 12px; overflow: hidden; }
    .party-bar-fill { height: 100%; border-radius: 100px; transition: width .3s; }
    .party-vote { font-size: 12px; font-weight: 400; color: #555; line-height: 1.8; }
    .party-vote .y { color: #2E7D32; font-weight: 600; }
    .party-vote .n { color: #C62828; font-weight: 600; }
    .party-donors-lbl { font-size: 9px; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; color: #aaa; margin: 10px 0 4px; }
    .party-donor { font-size: 12px; font-weight: 400; color: #777; line-height: 1.7; }
    .party-source { font-size: 10px; font-weight: 400; color: #bbb; margin-top: 8px; }

    /* ── GUIDE ── */
    .guide-card { background: #fff; border-radius: 12px; margin-bottom: 8px; overflow: hidden; }
    .guide-header { display: flex; justify-content: space-between; align-items: center; padding: 16px; cursor: pointer; }
    .guide-emoji { font-size: 20px; margin-right: 10px; }
    .guide-title { font-size: 14px; font-weight: 500; color: #222; flex: 1; }
    .guide-arrow { font-size: 14px; color: #ccc; transition: transform .25s; }
    .guide-arrow.open { transform: rotate(180deg); color: #E94560; }
    .guide-body { display: none; padding: 0 16px 16px; }
    .guide-body.open { display: block; }
    .guide-text { font-size: 13px; font-weight: 400; color: #555; line-height: 1.8; }
    .guide-text strong { font-weight: 600; color: #333; }
    .guide-text ul { margin: 8px 0 8px 18px; }
    .guide-text li { margin-bottom: 6px; }

    /* ── POLL ── */
    .poll-issue { background: #fff; border-radius: 12px; margin-bottom: 8px; padding: 16px; cursor: pointer; transition: all .1s; border: 2px solid transparent; }
    .poll-issue:hover { border-color: #E94560; }
    .poll-issue:active { transform: scale(0.98); }
    .poll-issue.selected { border-color: #E94560; background: #FFF0F3; }
    .poll-issue-name { font-size: 15px; font-weight: 600; color: #222; margin-bottom: 2px; }
    .poll-issue-desc { font-size: 12px; font-weight: 400; color: #888; line-height: 1.5; }
    .poll-issue .check { float: right; width: 24px; height: 24px; border-radius: 50%; border: 2px solid #ddd; display: flex; align-items: center; justify-content: center; font-size: 14px; color: transparent; transition: all .15s; flex-shrink: 0; }
    .poll-issue.selected .check { background: #E94560; border-color: #E94560; color: #fff; }
    input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 28px; height: 28px; background: #fff; border: 3px solid #222; border-radius: 50%; cursor: pointer; box-shadow: 0 2px 6px rgba(0,0,0,.2); }
    input[type="range"]::-moz-range-thumb { width: 28px; height: 28px; background: #fff; border: 3px solid #222; border-radius: 50%; cursor: pointer; }
    .poll-go { width: 100%; padding: 14px; border: none; background: #E94560; color: #fff; font-family: 'Roboto', sans-serif; font-size: 15px; font-weight: 600; border-radius: 12px; cursor: pointer; transition: all .1s; margin-top: 16px; letter-spacing: 0.3px; }
    .poll-go:hover { filter: brightness(1.1); }
    .poll-go:active { transform: scale(0.98); }
    .poll-go:disabled { background: #F0E6D3; color: #C4A882; cursor: default; filter: none; transform: none; }
    .poll-result { background: #fff; border-radius: 12px; padding: 16px; margin-bottom: 8px; }
    .poll-result-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .poll-result-name { font-size: 16px; font-weight: 500; color: #222; }
    .poll-result-pct { font-size: 18px; font-weight: 700; }
    .poll-result-bar { height: 8px; background: #f0ede8; border-radius: 100px; margin-bottom: 10px; overflow: hidden; }
    .poll-result-fill { height: 100%; border-radius: 100px; transition: width .6s ease; }
    .poll-result-detail { font-size: 12px; font-weight: 400; color: #666; line-height: 1.7; }
    .poll-result-match { font-size: 11px; font-weight: 500; padding: 3px 10px; border-radius: 100px; display: inline-block; margin-bottom: 8px; }
    .poll-reset { background: none; border: 1.5px solid #ddd; color: #888; font-family: 'Roboto', sans-serif; font-size: 13px; font-weight: 500; padding: 10px 20px; border-radius: 100px; cursor: pointer; transition: all .15s; margin-top: 12px; }
    .poll-reset:hover { border-color: #E94560; color: #E94560; }

    /* ── POKEMON CARD (exact proportions: 1:1.4, golden border) ── */
    .card { margin: 12px 24px; border: 8px solid #D4AF37; border-radius: 12px; background: #E8E4A0; padding: 8px; box-shadow: 0 4px 16px rgba(0,0,0,.12); }
    .card-name-bar { display: flex; justify-content: space-between; align-items: center; padding: 6px 10px; border-radius: 6px 6px 0 0; }
    .card-party-name { font-size: 17px; font-weight: 700; color: #222; }
    .card-hp { font-size: 16px; font-weight: 700; color: #E94560; }
    .card-hp span { font-size: 9px; font-weight: 600; }
    .card-art { margin: 4px 6px; border-radius: 4px; border: 3px solid #C4B454; height: 160px; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; }
    .card-art-icon { font-size: 72px; position: relative; z-index: 1; }
    .card-art-lvl { position: absolute; bottom: 6px; right: 8px; font-size: 8px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; padding: 3px 10px; border-radius: 100px; background: rgba(255,255,255,.9); color: #555; }
    .card-info-bar { display: flex; justify-content: center; gap: 16px; padding: 6px; font-size: 9px; font-weight: 500; color: #888; }
    .card-attacks { padding: 6px 10px; }
    .card-attack { display: flex; align-items: center; gap: 8px; padding: 8px 0; border-top: 1px solid rgba(0,0,0,.06); }
    .card-attack:first-child { border-top: none; }
    .card-attack-cost { width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; flex-shrink: 0; }
    .card-attack-name { flex: 1; font-size: 12px; font-weight: 600; color: #333; }
    .card-attack-dmg { font-size: 16px; font-weight: 700; color: #222; width: 36px; text-align: right; }
    .card-weak-bar { display: flex; justify-content: space-around; padding: 6px 10px; margin: 4px 6px; border-radius: 4px; background: rgba(0,0,0,.04); }
    .card-weak-item { text-align: center; }
    .card-weak-label { font-size: 8px; font-weight: 600; color: #aaa; text-transform: uppercase; letter-spacing: 0.5px; }
    .card-weak-val { font-size: 11px; font-weight: 700; margin-top: 2px; }
    .card-flavour { padding: 6px 12px; font-size: 10px; font-weight: 400; font-style: italic; color: #777; line-height: 1.5; text-align: center; }
    .card-set { display: flex; justify-content: space-between; padding: 4px 10px 2px; font-size: 8px; font-weight: 500; color: #aaa; }
    .card-cta { text-align: center; margin: 12px 16px; }
    .card-cta-btn { width: 100%; padding: 14px; border: none; background: #E94560; color: #fff; font-family: 'Roboto', sans-serif; font-size: 15px; font-weight: 600; border-radius: 12px; cursor: pointer; transition: all .1s; }
    .card-cta-btn:hover { filter: brightness(1.1); }
    .card-cta-btn:active { transform: scale(0.98); }

    /* ── STANCE ── */
    .stance { font-size: 13px; font-weight: 400; color: #555; line-height: 1.75; padding: 16px; background: linear-gradient(135deg, #1B4332 0%, #2D6A4F 100%); border-radius: 12px; margin-bottom: 16px; color: rgba(255,255,255,.9); }
    .stance strong { font-weight: 600; color: #95D5B2; }

    /* ── SIGNUP ── */
    .signup-sec { background: #111; padding: 24px 20px; margin: 20px 16px 0; border-radius: 12px; }
    .signup-emoji { font-size: 28px; margin-bottom: 8px; }
    .signup-title { font-size: 18px; font-weight: 500; color: #fff; margin-bottom: 4px; }
    .signup-sub { font-size: 13px; font-weight: 300; color: rgba(255,255,255,.65); margin-bottom: 16px; line-height: 1.6; }
    .signup-form { display: none; }
    .signup-form.open { display: block; }
    .signup-row { margin-bottom: 10px; }
    .signup-input { width: 100%; padding: 12px 14px; border: none; background: rgba(255,255,255,.1); color: #fff; font-family: 'Roboto', sans-serif; font-size: 14px; font-weight: 400; border-radius: 8px; outline: none; }
    .signup-input::placeholder { color: rgba(255,255,255,.4); }

    .signup-submit:hover { filter: brightness(1.15); }

    /* ── FOOTER ── */
    .foot { padding: 20px 20px 30px; text-align: center; }
    .foot-text { font-size: 10px; font-weight: 500; color: #C4A882; letter-spacing: 0.5px; }

    /* ── ACADEMIC INSIGHT ── */
    .insight-card { background: #fff; border-radius: 12px; padding: 16px; margin-bottom: 10px; }
    .insight-quote { font-size: 13px; font-weight: 400; color: #444; line-height: 1.75; font-style: italic; margin-bottom: 8px; }
    .insight-author { font-size: 12px; font-weight: 600; color: #1B4332; }
    .insight-src { font-size: 10px; font-weight: 400; color: #aaa; line-height: 1.5; }
  </style>

<div id="app">
  <div class="hdr">
    <video class="hdr-video" autoplay muted loop playsinline>
      <source src="https://videos.pexels.com/video-files/4793578/4793578-uhd_1440_2560_30fps.mp4" type="video/mp4">
    </video>
    <div class="hdr-overlay">
      <div class="hdr-wordmark">Radical <span>Love</span></div>
      <div class="hdr-tagline">For the people. By the people.</div>
    </div>

  <div class="tabs">

<script>
/* ══════════════════════════════════════════════════════════════════════════════

function renderCard(profile) {
  const topParty = profile.results[0];
  const chosenInfo = profile.chosen !== 'unsure' ? PARTY_KEYS.find(p => p.key === profile.chosen) : null;
  const topInfo = PARTY_KEYS.find(p => p.key === topParty.key);

  // Calc dimension stats
  const dims = [{key:'treaty',label:'Treaty'},{key:'whanau',label:'Wh\u0101nau'},{key:'economy',label:'Economy'},{key:'justice',label:'Justice'},{key:'environ',label:'Environment'},{key:'education',label:'Education'},{key:'health',label:'Health'},{key:'housing',label:'Housing'}];
  const dimScores = {};
  dims.forEach(d => { dimScores[d.key] = { user: 0, count: 0 }; });
  profile.answers.forEach(ans => {
    const qq = QUESTIONS[ans.qIdx];
    if (dimScores[qq.dim]) { dimScores[qq.dim].user += ans.score / 4; dimScores[qq.dim].count++; }
  });
  const activeDims = dims.filter(d => dimScores[d.key].count > 0)
    .map(d => ({ ...d, pct: Math.round((dimScores[d.key].user / dimScores[d.key].count) * 100) }))
    .sort((a,b) => b.pct - a.pct);

  // Evolution
  const n = profile.answers.length;
  const lvl = n <= 3 ? 'Basic' : n <= 10 ? 'Stage 1' : n <= 20 ? 'Stage 2' : 'Final Form';

  // Random Pokemon image from PokeAPI (different each day)
  const dayOfYear = Math.floor((new Date() - new Date(new Date().getFullYear(),0,0)) / 86400000);
  const pokeId = (dayOfYear % 151) + 1; // Gen 1 Pokemon, rotates daily
  const pokeImg = `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/${pokeId}.png`;

  // Party type colours (like Pokemon types)
  const typeBg = {tpm:'#FBE3EB',grn:'#E3F8E8',lab:'#FDE8E8',nat:'#E3EDF8',act:'#FFF9DB',nzf:'#EDEDEE',unsure:'#FFF5E1'};
  const artBg = {tpm:'linear-gradient(135deg,#F8BBD0,#F48FB1)',grn:'linear-gradient(135deg,#C8E6C9,#81C784)',lab:'linear-gradient(135deg,#FFCDD2,#EF9A9A)',nat:'linear-gradient(135deg,#BBDEFB,#64B5F6)',act:'linear-gradient(135deg,#FFF9C4,#FFF176)',nzf:'linear-gradient(135deg,#E0E0E0,#BDBDBD)',unsure:'linear-gradient(135deg,#FFE0B2,#FFB74D)'};

  // Issue emojis for "attack cost"
  const dimEmoji = {treaty:'\u{1F4DC}',whanau:'\u{1F46A}',economy:'\u{1F4B0}',justice:'\u2696\uFE0F',environ:'\u{1F331}',education:'\u{1F4DA}',health:'\u2764\uFE0F',housing:'\u{1F3E0}'};

  // Party descriptions
  const partyDesc = {
    tpm:'Champions Te Tiriti o Waitangi, tino rangatiratanga, and community-led solutions.',
    grn:'Strongest on climate, wealth redistribution, and social equity.',
    lab:'Centre-left. Moderate on most issues. Introduced key equity legislation.',
    nat:'Centre-right. Tax cuts, market-led solutions. Corporate donor base.',
    act:'Free market, deregulation. Introduced the Treaty Principles Bill.',
    nzf:'Populist. Positions shift depending on coalition partner.',
    unsure:'Still figuring it out. That\u2019s what this is for.',
  };

  let h = '';

  // THE CARD
  h += `<div class="card" style="background:${typeBg[topParty.key] || '#FFF5E1'};">

    <!-- Name / HP bar -->
    <div class="card-name-bar" style="background:${typeBg[topParty.key]};">
      <div class="card-party-name" style="color:${topInfo.colour};">${topInfo.name}</div>
      <div class="card-hp"><span>HP </span>${topParty.pct}</div>
    </div>

    <!-- Illustration -->
    <div class="card-art" style="background:${artBg[topParty.key]};">
      <img src="${pokeImg}" style="height:130px;position:relative;z-index:1;filter:drop-shadow(0 4px 8px rgba(0,0,0,.15));" alt="" onerror="this.style.display='none'">
      <div class="card-art-lvl">${lvl}</div>
    </div>

    <!-- Info bar -->
    <div class="card-info-bar">
      <span>${lvl} Voter</span>
      <span>${n} questions answered</span>
      <span>${topParty.pct}% aligned</span>
    </div>

    <!-- Attacks = top issues -->
    <div class="card-attacks">`;

  activeDims.slice(0, 3).forEach(d => {
    h += `<div class="card-attack">
      <div class="card-attack-cost" style="background:${topInfo.colour}20;font-size:14px;">${dimEmoji[d.key] || '\u2B50'}</div>
      <div class="card-attack-name">${d.label}</div>
      <div class="card-attack-dmg" style="color:${topInfo.colour};">${d.pct}</div>
    </div>`;
  });
  h += `</div>`;

  // Weakness / Resistance / Retreat (other parties)
  const sorted = [...profile.results];
  const weakest = sorted[sorted.length - 1];
  const weakInfo = PARTY_KEYS.find(p => p.key === weakest.key);
  const secondInfo = PARTY_KEYS.find(p => p.key === sorted[1]?.key);

  h += `<div class="card-weak-bar">
    <div class="card-weak-item">
      <div class="card-weak-label">Weakest on</div>
      <div class="card-weak-val" style="color:${weakInfo?.colour || '#888'};">${weakInfo?.name.split(' ')[0] || '-'} ${weakest?.pct || 0}%</div>
    </div>
    <div class="card-weak-item">
      <div class="card-weak-label">Runner up</div>
      <div class="card-weak-val" style="color:${secondInfo?.colour || '#888'};">${secondInfo?.name.split(' ')[0] || '-'} ${sorted[1]?.pct || 0}%</div>
    </div>
    <div class="card-weak-item">
      <div class="card-weak-label">Questions</div>
      <div class="card-weak-val">${n}/${QUESTIONS.length}</div>
    </div>
  </div>`;

  // Flavour text
  h += `<div class="card-flavour">${partyDesc[topParty.key] || ''}</div>`;

  // Gap callout
  if (chosenInfo && topParty.key !== profile.chosen) {
    const chosenResult = profile.results.find(r => r.key === profile.chosen);
    h += `<div style="padding:0 10px 6px;">
      <div style="font-size:10px;font-weight:400;color:#E94560;line-height:1.4;padding:6px 8px;background:rgba(233,69,96,.06);border-radius:6px;text-align:center;">
        You picked ${chosenInfo.name} (${chosenResult.pct}%) but your answers say ${topInfo.name}.
      </div>
    </div>`;
  }

  // Set info
  h += `<div class="card-set">
    <span>Radical Love \u00B7 2026</span>
    <span style="color:${topInfo.colour};">\u2605</span>
    <span>${n}/${QUESTIONS.length}</span>
  </div>`;

  h += `</div>`; // card

  // CTA
  const answeredToday = profile.lastAnswered === new Date().toISOString().slice(0,10);
  const allDone = n >= QUESTIONS.length;

  h += `<div class="card-cta">`;
  if (allDone) {
    h += `<div style="font-size:13px;font-weight:400;color:#999;text-align:center;padding:10px 0;">All ${QUESTIONS.length} questions answered. New ones coming soon.</div>`;
  } else if (answeredToday) {
    h += `<div style="font-size:13px;font-weight:400;color:#999;text-align:center;padding:10px 0;">Come back tomorrow for your next question.</div>`;
  } else {
    h += `<button class="card-cta-btn" onclick="startQuestions()">Today\u2019s question</button>`;
  }
  h += `</div>`;
  h += `<div style="text-align:center;padding-bottom:20px;"><button class="poll-reset" onclick="clearProfile()">Start fresh</button></div>`;

  return h;
}

/* ── ADAPTIVE QUESTION SELECTION (CAT/IRT) ────────────────────────────────
 * Picks the question that maximises information gain.
 * Based on Montgomery & Cutler (2013) — Minimum Expected Posterior Variance.
 *
 * For each unanswered question, calculates:
 *   information = discrimination^2 * dimension_uncertainty
 *
 * dimension_uncertainty = how few questions answered in that dimension
 * discrimination = how well this item separates people (from question bank)
 *
 * Timely questions (current events) get a 1.5x boost.
 * Collective-framed questions (Kaupapa M\u0101ori) get slight priority early
 * to establish the bicultural frame before deeper policy questions.
 * ──────────────────────────────────────────────────────────────────────────── */
function selectNextQuestion() {
  const answeredIds = new Set(answers.map(a => a.qIdx));

  // Count answers per dimension
  const dimCounts = {};
  QUESTIONS.forEach(q => { dimCounts[q.dim] = 0; });
  answers.forEach(a => { dimCounts[QUESTIONS[a.qIdx].dim]++; });

  // Find dimension with least coverage (highest uncertainty)
  const maxDimCount = Math.max(...Object.values(dimCounts), 1);

  let bestIdx = -1;
  let bestScore = -1;

  QUESTIONS.forEach((q, i) => {
    if (answeredIds.has(i)) return;

    // Dimension uncertainty: inverse of how covered this dimension is (0-1)
    const dimUncertainty = 1 - (dimCounts[q.dim] / (maxDimCount + 1));

    // Information gain = discrimination^2 * uncertainty
    let info = (q.disc * q.disc) * (0.3 + 0.7 * dimUncertainty);

    // Timely boost (current events questions get priority)
    if (q.timely) info *= 1.5;

    // Early collective framing boost (first 5 questions)
    if (q.collective && answers.length < 5) info *= 1.3;

    // Small random jitter so users don\u2019t all get identical sequences
    info *= (0.9 + Math.random() * 0.2);

    if (info > bestScore) { bestScore = info; bestIdx = i; }
  });

  return bestIdx;
}

function selectAndShowQuestion() {
  currentQ = selectNextQuestion();
  if (currentQ === -1) {
    // All questions answered
    finishPoll();
    return;
  }
  showQuestion();
}

    <button onclick="skipQ()" style="background:none;border:none;color:#ccc;font-family:'Roboto',sans-serif;font-size:12px;cursor:pointer;padding:8px;">Not today, skip this one</button>
  </div>`;

  container.innerHTML = h;
  document.getElementById('scr').scrollTop = 0;
}

/* ── SWIPE MECHANICS ── */
let swipeStartX = 0;
let swiping = false;

function swipeStart(e) {
  swipeStartX = e.touches ? e.touches[0].clientX : e.clientX;
  swiping = true;
  if (!e.touches) {
    document.addEventListener('mousemove', swipeMove);
    document.addEventListener('mouseup', swipeEnd);
  }
}

function swipeMove(e) {
  if (!swiping) return;
  const x = e.touches ? e.touches[0].clientX : e.clientX;
  const diff = x - swipeStartX;
  const card = document.getElementById('swipe-card');
  if (card) {
    card.style.transform = `translateX(${diff}px) rotate(${diff * 0.1}deg)`;
    card.style.opacity = Math.max(0.5, 1 - Math.abs(diff) / 300);
  }
}

function swipeEnd(e) {
  if (!swiping) return;
  swiping = false;
  document.removeEventListener('mousemove', swipeMove);
  document.removeEventListener('mouseup', swipeEnd);
  const x = e.changedTouches ? e.changedTouches[0].clientX : e.clientX;
  const diff = x - swipeStartX;
  const card = document.getElementById('swipe-card');

  if (Math.abs(diff) > 80) {
    // Swiped far enough
    if (card) {
      card.style.transform = `translateX(${diff > 0 ? 300 : -300}px) rotate(${diff > 0 ? 20 : -20}deg)`;
      card.style.opacity = '0';
    }
    // Right = agree (3-4), Left = disagree (0-1), intensity based on distance
    const intensity = Math.min(Math.abs(diff) / 150, 1);
    const score = diff > 0 ? (intensity > 0.6 ? 4 : 3) : (intensity > 0.6 ? 0 : 1);
    setTimeout(() => answerQ(score), 200);
  } else {
    // Snap back
    if (card) { card.style.transform = ''; card.style.opacity = '1'; }
  }
}

/* ── BUDGET MECHANICS ── */
function updateBudget(val) {
  const left = 100 - parseInt(val);
  const right = parseInt(val);
  const el = document.getElementById('budget-left');
  const er = document.getElementById('budget-right');
  if (el) el.textContent = `$${left}`;
  if (er) er.textContent = `$${right}`;
  // Size scales with amount
  if (el) el.style.fontSize = `${20 + (left / 100) * 16}px`;
  if (er) er.style.fontSize = `${20 + (right / 100) * 16}px`;
}

function updateSliderLabel(val) {
  const labels = ['Strongly disagree','Disagree','Neutral','Agree','Strongly agree'];

}

function skipQ() {
  // Silence is valid (Kaupapa M\u0101ori),just go back to card without recording
  finishPoll();
}

function answerQ(score) {
  const q = QUESTIONS[currentQ];
  answers.push({ qIdx: currentQ, score });

  const container = document.getElementById('poll-step2');
  const labels = ['Strongly disagreed','Disagreed','Were neutral','Agreed','Strongly agreed'];
  const cols = ['#E94560','#E94560','#888','#4CAF50','#4CAF50'];

  let h = '';

  // Your answer
  h += `<div style="font-size:14px;font-weight:400;color:#777;line-height:1.5;margin-bottom:6px;font-style:italic;">\u201C${q.q}\u201D</div>`;
  h += `<div style="font-size:15px;font-weight:600;color:${cols[score]};margin-bottom:16px;">You ${labels[score].toLowerCase()}</div>`;

  // Party alignment FIRST (moved above did-you-consider)
  if (chosenParty && chosenParty !== 'unsure') {
    const partyInfo = PARTY_KEYS.find(p => p.key === chosenParty);
    const partyScore = q.scores[chosenParty];
    const partyStance = partyScore === 3 ? 'supports this' : partyScore === 2 ? 'partially supports this' : partyScore === 1 ? 'is unclear on this' : 'opposes this';
    const partyCol = partyScore >= 2 ? '#4CAF50' : partyScore === 1 ? '#F9A825' : '#E94560';
    const userNorm = score / 4;
    const partyNorm = partyScore / 3;
    const match = Math.abs(userNorm - partyNorm) < 0.3;

    h += `<div style="background:#fff;border-radius:10px;padding:14px;margin-bottom:14px;">
      <div style="font-size:14px;font-weight:400;color:#444;line-height:1.6;">
        <strong style="color:${partyInfo.colour}">${partyInfo.name}</strong> <span style="color:${partyCol};font-weight:500;">${partyStance}</span>.
        ${match ? '<span style="color:#4CAF50;font-weight:500;"> You\u2019re aligned.</span>' : '<span style="color:#E94560;font-weight:500;"> Gap detected.</span>'}
      </div>
    </div>`;
  }

  // Did you consider? SECOND
  h += `<div style="background:#1B4332;border-radius:10px;padding:14px;margin-bottom:14px;">
    <div style="font-size:10px;font-weight:600;letter-spacing:1.5px;color:#95D5B2;text-transform:uppercase;margin-bottom:6px;">Did you consider?</div>
    <div style="font-size:13px;font-weight:400;color:rgba(255,255,255,.9);line-height:1.75;">${q.consider}</div>
  </div>`;

  // See your card button (always visible)
  h += `<button class="poll-go" onclick="finishPoll()">See your card</button>`;

  container.innerHTML = h;
  document.getElementById('scr').scrollTop = 0;
}

function setSalience(weight) {
  // Update the last answer with salience weight
  if (answers.length > 0) {
    answers[answers.length - 1].salience = weight;
  }
  document.getElementById('salience-next').style.display = 'block';
  // Highlight selected
  const btns = document.querySelectorAll('#poll-step2 [onclick^="setSalience"]');
  btns.forEach(b => { b.style.background = 'none'; b.style.borderColor = '#ddd'; b.style.color = '#888'; b.style.fontWeight = '400'; });
  const sel = btns[weight - 1];
  if (sel) { sel.style.background = 'rgba(233,69,96,.1)'; sel.style.borderColor = '#E94560'; sel.style.color = '#E94560'; sel.style.fontWeight = '500'; }
}

function finishPoll() {
  // Calculate results with salience weighting (VAA methodology)
  const results = PARTY_KEYS.map(p => {
    let total = 0; let max = 0;
    answers.forEach(a => {
      const q = QUESTIONS[a.qIdx];
      const salience = a.salience || 1;
      const userNorm = a.score / 4; // 5-point scale: 0-4 → 0-1
      const partyNorm = q.scores[p.key] / 3; // 0-3 → 0-1
      total += (1 - Math.abs(userNorm - partyNorm)) * salience;
      max += salience;
    });
    return { key: p.key, pct: max > 0 ? Math.round((total / max) * 100) : 0 };
  });
  results.sort((a, b) => b.pct - a.pct);

  // Save profile with today's date
  const profile = { chosen: chosenParty, answers, results, date: new Date().toISOString(), lastAnswered: new Date().toISOString().slice(0,10) };
  localStorage.setItem('rl_profile', JSON.stringify(profile));

  // Re-render as card
  const tabs = document.querySelectorAll('.tab');
  go(0, tabs[0]);

  // Ask for push notifications after first answer (only once)
  if (!localStorage.getItem('rl_push_asked') && 'Notification' in window && Notification.permission !== 'denied') {
    setTimeout(() => askForNotifications(), 500);
  }
}

function clearProfile() {
  localStorage.removeItem('rl_profile');
  chosenParty = null; currentQ = 0; answers = [];
  const tabs = document.querySelectorAll('.tab');
  go(0, tabs[0]);
}

function resetPoll() { clearProfile(); } // kept as alias for onclick references

async function shareCard(type, id) {
  // Try native share with file (mobile)
  if (navigator.share && navigator.canShare) {
    try {
      const res = await fetch(`/api/generate-card?type=${type}&id=${id}`);
      if (res.ok) {
        const blob = await res.blob();
        const file = new File([blob], `radical-love-${type}-${id}.png`, {type:'image/png'});
        if (navigator.canShare({files:[file]})) {
          await navigator.share({files:[file], title:'Radical Love'});
          return;
        }
      }
    } catch {}
  }
  // Fallback: canvas card
  generateCanvasCard(type, id);
}

function generateCanvasCard(type, id) {
  const c = document.createElement('canvas');
  c.width = 1080; c.height = 1080;
  const ctx = c.getContext('2d');

  // BG gradient
  const grad = ctx.createLinearGradient(0,0,1080,1080);
  grad.addColorStop(0,'#1a1a2e'); grad.addColorStop(1,'#16213e');
  ctx.fillStyle = grad; ctx.fillRect(0,0,1080,1080);

  // Wordmark
  ctx.fillStyle = '#E94560';
  ctx.font = '700 28px Roboto, sans-serif';
  ctx.fillText('RADICAL LOVE', 60, 80);

  ctx.fillStyle = '#333'; ctx.fillRect(60, 100, 960, 1);

  let title='', body='', source='';
  if (type==='quote') {
    const q = QUOTES[parseInt(id)%QUOTES.length];
    body = `\u201C${q.q}\u201D`;
    source = `\u2014 ${q.a}\n${q.src}`;
  } else if (type==='talking-point') {
    const tp = TALKING_POINTS.find(t=>t.id===id);
    if(tp){title=tp.topic.toUpperCase();body=tp.keyStat;source=`${tp.keyStatCtx}\n\nSource: ${tp.source}`;}
  } else if (type==='bill') {
    const b = SEED_BILLS.find(x=>x.id===id);
    if(b){title='BILL ALERT';body=b.name;source=b.summary;}
  } else if (type==='tiriti') {
    title='TE TIRITI O WAITANGI'; body='Know Your Rights'; source='radicallove.nz';
  } else if (type==='party') {
    const p = PARTIES.find(x=>x.name.replace(/\s+/g,'-').toLowerCase()===id);
    if(p){title='PARTY SCORECARD';body=`${p.name}: ${p.score}/10`;source=p.source;}
  }

  if(title){ctx.fillStyle='#E94560';ctx.font='600 18px Roboto,sans-serif';ctx.fillText(title,60,170);}

  ctx.fillStyle='#fff';
  if(type==='talking-point'){ctx.font='300 120px Roboto,sans-serif';ctx.fillText(body,60,420);}
  else{ctx.font='300 36px Roboto,sans-serif';wrapText(ctx,body,60,280,960,52);}

  ctx.fillStyle='rgba(255,255,255,0.55)';ctx.font='300 20px Roboto,sans-serif';
  let sy=880; source.split('\n').forEach(l=>{wrapText(ctx,l,60,sy,960,28);sy+=30;});

  ctx.fillStyle='rgba(255,255,255,0.3)';ctx.font='400 16px Roboto,sans-serif';ctx.fillText('radicallove.nz',60,1040);

  c.toBlob(blob=>{
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');a.href=url;a.download=`radical-love-${type}-${id}.png`;a.click();
    URL.revokeObjectURL(url);
  },'image/png');
}

function wrapText(ctx,text,x,y,maxW,lh){
  const words=text.split(' ');let line='';
  for(let n=0;n<words.length;n++){
    const t=line+words[n]+' ';
    if(ctx.measureText(t).width>maxW&&n>0){ctx.fillText(line.trim(),x,y);line=words[n]+' ';y+=lh;}
    else line=t;
  }
  ctx.fillText(line.trim(),x,y);
}

document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('scr').innerHTML = pollView();
  if('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js').then(reg => {
      // Store registration for push subscription later
      window._swReg = reg;
    }).catch(()=>{});
  }

  const VAPID_PUBLIC = 'BI1f4hQMEgo3ylTjy6ZKJeXUmL7PUjmzJf2av9yKqFg5A4APENI4xMnJVVKbfeDQe6ZRLAuV3xzbWXs6X1-lsNc';

  async function subscribePush() {
    if (!('serviceWorker' in navigator) || !('PushManager' in window)) return false;
    try {
      const reg = window._swReg || await navigator.serviceWorker.ready;
      const existing = await reg.pushManager.getSubscription();
      if (existing) return true; // Already subscribed

      const sub = await reg.pushManager.subscribe({
        userVisibleOnly: true,
        applicationServerKey: urlBase64ToUint8Array(VAPID_PUBLIC),
      });

      // Send subscription to server
      await fetch('/api/push-subscribe', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(sub.toJSON()),
      });
      return true;
    } catch (e) {
      console.log('Push subscription failed:', e.message);
      return false;
    }
  }

  function urlBase64ToUint8Array(base64String) {
    const padding = '='.repeat((4 - base64String.length % 4) % 4);
    const base64 = (base64String + padding).replace(/-/g, '+').replace(/_/g, '/');
    const rawData = atob(base64);
    const outputArray = new Uint8Array(rawData.length);
    for (let i = 0; i < rawData.length; ++i) outputArray[i] = rawData.charCodeAt(i);
    return outputArray;
  }

  // Ask for push permission after first question answered (not on load — that's annoying)
  function askForNotifications() {
    if (Notification.permission === 'granted') {
      subscribePush();
      return;
    }
    if (Notification.permission === 'denied') return;
    // Show a friendly prompt in the UI, not the raw browser popup
    const scr = document.getElementById('scr');
    const banner = document.createElement('div');
    banner.id = 'push-banner';
    banner.style.cssText = 'margin:12px 20px;background:linear-gradient(135deg,#1a1a2e,#16213e);border-radius:12px;padding:16px;';
    banner.innerHTML = `
      <div style="font-size:14px;font-weight:500;color:#fff;margin-bottom:6px;">Get your daily question</div>
      <div style="font-size:12px;font-weight:300;color:rgba(255,255,255,.65);line-height:1.6;margin-bottom:12px;">One notification a day at 7am. Your card evolves with every answer.</div>
      <div style="display:flex;gap:8px;">
        <button onclick="enablePush()" style="flex:1;padding:10px;border:none;background:#E94560;color:#fff;font-family:'Roboto',sans-serif;font-size:13px;font-weight:500;border-radius:8px;cursor:pointer;">Yes please</button>
        <button onclick="dismissPush()" style="flex:1;padding:10px;border:none;background:rgba(255,255,255,.1);color:rgba(255,255,255,.6);font-family:'Roboto',sans-serif;font-size:13px;font-weight:500;border-radius:8px;cursor:pointer;">Not now</button>
      </div>`;
    scr.insertBefore(banner, scr.firstChild);
  }

  async function enablePush() {
    const ok = await subscribePush();
    const banner = document.getElementById('push-banner');
    if (banner) {
      if (ok) {
        banner.innerHTML = '<div style="font-size:13px;font-weight:400;color:#2E7D32;text-align:center;padding:8px 0;">Sorted. See you tomorrow morning.</div>';
        setTimeout(() => banner.remove(), 2000);
      } else {
        banner.innerHTML = '<div style="font-size:13px;font-weight:400;color:#C62828;text-align:center;padding:8px 0;">Notifications blocked. Check your browser settings.</div>';
        setTimeout(() => banner.remove(), 3000);
      }
    }
    localStorage.setItem('rl_push_asked', '1');
  }

  function dismissPush() {
    const banner = document.getElementById('push-banner');
    if (banner) banner.remove();
    localStorage.setItem('rl_push_asked', '1');
  }
});
