<!DOCTYPE html>
<html lang="en">
<head>

  <meta name="apple-mobile-web-app-capable" content="yes">

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      font-family: 'Roboto', sans-serif;
      background: #111;
      color: #222;
      height: 100%;
      -webkit-font-smoothing: antialiased;
      overscroll-behavior: none;
    }
    #app {
      width: 100%;
      max-width: 480px;
      margin: 0 auto;
      background: #FAF8F5;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── HEADER ── */
    .hdr { background: #111; padding: 0; flex-shrink: 0; text-align: center; position: relative; overflow: hidden; }
    .hdr-video { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; opacity: 0.4; pointer-events: none; }
    .hdr-overlay { position: relative; z-index: 1; padding: 24px 20px 16px; background: linear-gradient(to bottom, rgba(0,0,0,.3) 0%, rgba(0,0,0,.6) 100%); }
    .hdr-wordmark { font-size: 28px; font-weight: 700; color: #fff; letter-spacing: 1px; }
    .hdr-wordmark span { color: #E94560; }
    .hdr-tagline { font-size: 13px; font-weight: 300; color: rgba(255,255,255,.85); margin-top: 4px; letter-spacing: 0.3px; }
    .hdr-date { font-size: 11px; font-weight: 400; color: rgba(255,255,255,.6); margin-top: 10px; }

    /* ── TABS ── */
    .tabs { display: flex; background: #fff; flex-shrink: 0; position: sticky; top: 0; z-index: 10; border-bottom: 2px solid #f0ede8; }
    .tab { flex: 1; padding: 10px 2px 8px; border: none; background: none; cursor: pointer; font-family: 'Roboto', sans-serif; font-size: 10px; font-weight: 500; letter-spacing: 0.3px; color: #999; border-bottom: 3px solid transparent; transition: all .2s; text-align: center; }
    .tab:hover { color: #555; }
    .tab.on { color: #E94560; font-weight: 600; border-bottom-color: #E94560; }
    .tab-emoji { display: block; font-size: 18px; margin-bottom: 2px; }

    /* ── SCROLL ── */
    .scr { flex: 1; min-height: 0; overflow-y: auto; -webkit-overflow-scrolling: touch; }
    .scr::-webkit-scrollbar { width: 0; }

    /* ── SHARED ── */
    .lbl { font-size: 11px; font-weight: 600; letter-spacing: 1.5px; color: #888; text-transform: uppercase; margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
    .lbl::after { content: ''; flex: 1; height: 1px; background: #e8e4df; }
    .sec { padding: 20px 20px 0; }
    .intro { font-size: 14px; font-weight: 300; color: #666; line-height: 1.7; margin-bottom: 16px; }

    /* ── QUOTE HERO ── */
    .quote-hero { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); padding: 16px 20px; border-radius: 12px; margin: 12px 20px 0; }
    .quote-label { font-size: 9px; font-weight: 500; letter-spacing: 2px; color: #E94560; text-transform: uppercase; margin-bottom: 8px; }
    .quote-text { font-size: 15px; font-weight: 300; font-style: italic; color: #fff; line-height: 1.65; margin-bottom: 8px; }
    .quote-attr { font-size: 12px; font-weight: 500; color: rgba(255,255,255,.85); }
    .quote-src { font-size: 10px; font-weight: 300; color: rgba(255,255,255,.5); margin-top: 2px; line-height: 1.4; }
    .quote-footer { display: flex; align-items: center; justify-content: space-between; margin-top: 8px; }

    /* ── ORIGIN BADGES ── */
    .origin { font-size: 9px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; padding: 4px 10px; border-radius: 100px; display: inline-block; }
    .origin.aotearoa { background: rgba(27,67,50,.15); color: #1B4560; }
    .origin.pacific { background: rgba(26,58,92,.15); color: #1A3A5C; }
    .origin.indigenous { background: rgba(183,121,31,.15); color: #8B6914; }
    .origin.intl { background: rgba(0,0,0,.06); color: #888; }

    /* ── SHARE BUTTON ── */
    .share-btn { display: inline-flex; align-items: center; gap: 6px; background: #E94560; border: none; color: #fff; font-family: 'Roboto', sans-serif; font-size: 11px; font-weight: 500; letter-spacing: 0.5px; padding: 8px 16px; border-radius: 100px; cursor: pointer; transition: all .15s; }
    .share-btn:hover { filter: brightness(1.15); transform: scale(1.02); }
    .share-btn-outline { background: none; border: 1.5px solid #ddd; color: #666; }
    .share-btn-outline:hover { border-color: #E94560; color: #E94560; background: rgba(233,69,96,.05); }

    /* ── BILL CARDS ── */
    .bill-card { padding: 16px; background: #fff; border-radius: 12px; margin-bottom: 10px; }
    .bill-name { font-size: 16px; font-weight: 500; color: #222; line-height: 1.35; margin-bottom: 6px; }
    .bill-meta { display: flex; align-items: center; gap: 6px; margin-bottom: 8px; flex-wrap: wrap; }
    .bill-badge { font-size: 9px; font-weight: 600; letter-spacing: 0.8px; text-transform: uppercase; padding: 4px 10px; border-radius: 100px; white-space: nowrap; }
    .bill-badge.select-committee { background: #FFF3CD; color: #856404; }
    .bill-badge.passed { background: #F8D7DA; color: #721C24; }
    .bill-badge.first-reading { background: #D1ECF1; color: #0C5460; }
    .bill-badge.second-reading { background: #FFE0B2; color: #E65100; }
    .bill-badge.third-reading { background: #C8E6C9; color: #2E7D32; }
    .bill-badge.party { background: #f5f2ed; color: #888; }
    .bill-summary { font-size: 13px; font-weight: 400; color: #555; line-height: 1.75; margin-bottom: 10px; }
    .bill-actions { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    .bill-link { font-size: 11px; font-weight: 500; color: #E94560; text-decoration: none; padding: 6px 14px; border: 1.5px solid #E94560; border-radius: 100px; transition: all .15s; }
    .bill-link:hover { background: #E94560; color: #fff; }

    .tk-card { background: #fff; border-radius: 12px; margin-bottom: 10px; overflow: hidden; }

    .tk-topic { font-size: 15px; font-weight: 500; color: #222; }

    .tk-arrow { font-size: 14px; color: #ccc; transition: transform .25s; }
    .tk-arrow.open { transform: rotate(180deg); color: #E94560; }
    .tk-body { display: none; padding: 0 16px 16px; }
    .tk-body.open { display: block; }
    .tk-they-say { font-size: 14px; font-weight: 400; font-style: italic; color: #888; line-height: 1.65; margin-bottom: 14px; padding: 12px 14px; background: #faf7f4; border-radius: 8px; border-left: 3px solid #ddd; }
    .tk-reality-lbl { font-size: 10px; font-weight: 600; letter-spacing: 1.5px; color: #E94560; text-transform: uppercase; margin-bottom: 6px; }
    .tk-reality { font-size: 13px; font-weight: 400; color: #444; line-height: 1.75; margin-bottom: 16px; }
    .tk-stat-box { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); border-radius: 12px; padding: 20px; margin-bottom: 12px; text-align: center; }
    .tk-stat { font-size: 52px; font-weight: 300; color: #fff; letter-spacing: -2px; line-height: 1.1; }
    .tk-stat-ctx { font-size: 13px; font-weight: 400; color: rgba(255,255,255,.8); line-height: 1.5; margin-top: 6px; }
    .tk-source { font-size: 10px; font-weight: 400; color: #aaa; line-height: 1.5; margin-bottom: 10px; }

    /* ── TIRITI ── */
    .tiriti-hero { background: linear-gradient(135deg, #1B4332 0%, #2D6A4F 100%); padding: 28px 24px; border-radius: 16px; margin: 16px 20px 0; }
    .tiriti-hero-lbl { font-size: 10px; font-weight: 500; letter-spacing: 2px; color: #95D5B2; text-transform: uppercase; margin-bottom: 10px; }
    .tiriti-hero-title { font-size: 18px; font-weight: 500; color: #fff; line-height: 1.4; margin-bottom: 6px; }
    .tiriti-hero-sub { font-size: 13px; font-weight: 300; color: rgba(255,255,255,.7); margin-bottom: 12px; }
    .tiriti-hero-body { font-size: 13px; font-weight: 400; color: rgba(255,255,255,.9); line-height: 1.75; }
    .tiriti-hero-src { font-size: 10px; font-weight: 300; color: rgba(255,255,255,.5); margin-top: 10px; }

    .tiriti-article { background: #fff; border-radius: 12px; margin-bottom: 10px; padding: 16px; }
    .tiriti-num { font-size: 10px; font-weight: 600; letter-spacing: 1.5px; color: #1B4332; text-transform: uppercase; margin-bottom: 8px; }
    .tiriti-cols { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
    .tiriti-col-lbl { font-size: 9px; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; color: #aaa; margin-bottom: 4px; }
    .tiriti-text { font-size: 12px; font-weight: 400; color: #555; line-height: 1.7; }
    .tiriti-diff { font-size: 13px; font-weight: 400; color: #333; line-height: 1.75; padding: 12px; background: #FFF8E1; border-radius: 8px; border-left: 3px solid #F9A825; }
    .tiriti-diff strong { font-weight: 500; color: #E65100; }

    /* ── TIMELINE ── */
    .tl-item { padding: 14px 16px; background: #fff; border-radius: 12px; margin-bottom: 8px; }
    .tl-year { font-size: 12px; font-weight: 700; color: #E94560; margin-bottom: 2px; }
    .tl-event { font-size: 14px; font-weight: 500; color: #222; line-height: 1.4; margin-bottom: 4px; }
    .tl-desc { font-size: 12px; font-weight: 400; color: #777; line-height: 1.65; }

    /* ── PARTY SCORECARD ── */
    .party-card { background: #fff; border-radius: 12px; padding: 16px; margin-bottom: 10px; }
    .party-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    .party-name { font-size: 16px; font-weight: 500; color: #222; }
    .party-score-num { font-size: 15px; font-weight: 700; }
    .party-bar { height: 8px; background: #f0ede8; border-radius: 100px; margin-bottom: 12px; overflow: hidden; }
    .party-bar-fill { height: 100%; border-radius: 100px; transition: width .3s; }
    .party-vote { font-size: 12px; font-weight: 400; color: #555; line-height: 1.8; }
    .party-vote .y { color: #2E7D32; font-weight: 600; }
    .party-vote .n { color: #C62828; font-weight: 600; }
    .party-donors-lbl { font-size: 9px; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; color: #aaa; margin: 10px 0 4px; }
    .party-donor { font-size: 12px; font-weight: 400; color: #777; line-height: 1.7; }
    .party-source { font-size: 10px; font-weight: 400; color: #bbb; margin-top: 8px; }

    /* ── GUIDE ── */
    .guide-card { background: #fff; border-radius: 12px; margin-bottom: 10px; overflow: hidden; }
    .guide-header { display: flex; justify-content: space-between; align-items: center; padding: 16px; cursor: pointer; }
    .guide-emoji { font-size: 20px; margin-right: 10px; }
    .guide-title { font-size: 14px; font-weight: 500; color: #222; flex: 1; }
    .guide-arrow { font-size: 14px; color: #ccc; transition: transform .25s; }
    .guide-arrow.open { transform: rotate(180deg); color: #E94560; }
    .guide-body { display: none; padding: 0 16px 16px; }
    .guide-body.open { display: block; }
    .guide-text { font-size: 13px; font-weight: 400; color: #555; line-height: 1.8; }
    .guide-text strong { font-weight: 600; color: #333; }
    .guide-text ul { margin: 8px 0 8px 18px; }
    .guide-text li { margin-bottom: 6px; }

    /* ── POLL ── */
    .poll-issue { background: #fff; border-radius: 12px; margin-bottom: 10px; padding: 16px; cursor: pointer; transition: all .15s; border: 2px solid transparent; }
    .poll-issue:hover { border-color: #E94560; }
    .poll-issue.selected { border-color: #E94560; background: #FFF5F7; }
    .poll-issue-name { font-size: 15px; font-weight: 500; color: #222; margin-bottom: 2px; }
    .poll-issue-desc { font-size: 12px; font-weight: 400; color: #888; line-height: 1.5; }
    .poll-issue .check { float: right; width: 24px; height: 24px; border-radius: 50%; border: 2px solid #ddd; display: flex; align-items: center; justify-content: center; font-size: 14px; color: transparent; transition: all .15s; flex-shrink: 0; }
    .poll-issue.selected .check { background: #E94560; border-color: #E94560; color: #fff; }
    .poll-go { width: 100%; padding: 14px; border: none; background: #E94560; color: #fff; font-family: 'Roboto', sans-serif; font-size: 15px; font-weight: 500; border-radius: 10px; cursor: pointer; transition: filter .15s; margin-top: 16px; }
    .poll-go:hover { filter: brightness(1.15); }
    .poll-go:disabled { background: #ddd; color: #999; cursor: default; filter: none; }
    .poll-result { background: #fff; border-radius: 12px; padding: 16px; margin-bottom: 10px; }
    .poll-result-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .poll-result-name { font-size: 16px; font-weight: 500; color: #222; }
    .poll-result-pct { font-size: 18px; font-weight: 700; }
    .poll-result-bar { height: 8px; background: #f0ede8; border-radius: 100px; margin-bottom: 10px; overflow: hidden; }
    .poll-result-fill { height: 100%; border-radius: 100px; transition: width .6s ease; }
    .poll-result-detail { font-size: 12px; font-weight: 400; color: #666; line-height: 1.7; }
    .poll-result-match { font-size: 11px; font-weight: 500; padding: 3px 10px; border-radius: 100px; display: inline-block; margin-bottom: 8px; }
    .poll-reset { background: none; border: 1.5px solid #ddd; color: #888; font-family: 'Roboto', sans-serif; font-size: 13px; font-weight: 500; padding: 10px 20px; border-radius: 100px; cursor: pointer; transition: all .15s; margin-top: 12px; }
    .poll-reset:hover { border-color: #E94560; color: #E94560; }

    /* ── PROFILE CARD (Pokémon style) ── */
    .card { margin: 16px 20px; border-radius: 20px; overflow: hidden; background: linear-gradient(145deg, #1a1a2e 0%, #16213e 40%, #0f3460 100%); border: 3px solid #E94560; box-shadow: 0 8px 32px rgba(233,69,96,.15), 0 2px 8px rgba(0,0,0,.1); }
    .card-inner { padding: 20px; }
    .card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 14px; }
    .card-type { font-size: 9px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; color: #E94560; }
    .card-level { font-size: 10px; font-weight: 500; color: rgba(255,255,255,.4); letter-spacing: 1px; }
    .card-name { font-size: 22px; font-weight: 700; color: #fff; margin-bottom: 2px; }
    .card-party { font-size: 13px; font-weight: 400; margin-bottom: 16px; }
    .card-quote { font-size: 13px; font-weight: 300; font-style: italic; color: rgba(255,255,255,.8); line-height: 1.6; margin-bottom: 4px; }
    .card-quote-attr { font-size: 10px; font-weight: 400; color: rgba(255,255,255,.4); margin-bottom: 16px; }
    .card-spectrum { margin-bottom: 12px; }
    .card-spec-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
    .card-spec-label { font-size: 10px; font-weight: 500; color: rgba(255,255,255,.5); width: 70px; text-align: right; flex-shrink: 0; letter-spacing: 0.3px; }
    .card-spec-track { flex: 1; height: 6px; background: rgba(255,255,255,.08); border-radius: 100px; position: relative; overflow: visible; }
    .card-spec-fill { height: 100%; border-radius: 100px; position: relative; }
    .card-spec-dots { position: absolute; top: -3px; display: flex; gap: 0; height: 12px; }
    .card-spec-dot { width: 12px; height: 12px; border-radius: 50%; border: 2px solid #1a1a2e; position: absolute; top: -3px; }
    .card-overlap { margin-top: 16px; padding-top: 14px; border-top: 1px solid rgba(255,255,255,.1); }
    .card-overlap-title { font-size: 10px; font-weight: 500; letter-spacing: 1.5px; text-transform: uppercase; color: rgba(255,255,255,.4); margin-bottom: 10px; }
    .card-overlap-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
    .card-overlap-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .card-overlap-name { font-size: 12px; font-weight: 400; color: rgba(255,255,255,.7); flex: 1; }
    .card-overlap-pct { font-size: 12px; font-weight: 600; }
    .card-footer { display: flex; justify-content: space-between; align-items: center; padding: 12px 20px; background: rgba(0,0,0,.2); }

    .card-cta { text-align: center; margin: 16px 20px; }
    .card-cta-btn { width: 100%; padding: 14px; border: none; background: #E94560; color: #fff; font-family: 'Roboto', sans-serif; font-size: 15px; font-weight: 500; border-radius: 12px; cursor: pointer; transition: filter .15s; }
    .card-cta-btn:hover { filter: brightness(1.15); }
    .card-cta-sub { font-size: 12px; color: #999; margin-top: 8px; }

    /* ── STANCE ── */
    .stance { font-size: 13px; font-weight: 400; color: #555; line-height: 1.75; padding: 16px; background: linear-gradient(135deg, #1B4332 0%, #2D6A4F 100%); border-radius: 12px; margin-bottom: 16px; color: rgba(255,255,255,.9); }
    .stance strong { font-weight: 600; color: #95D5B2; }

    /* ── SIGNUP ── */
    .signup-sec { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); padding: 28px 24px; margin: 20px 20px 0; border-radius: 16px; }
    .signup-emoji { font-size: 32px; margin-bottom: 10px; }
    .signup-title { font-size: 18px; font-weight: 500; color: #fff; margin-bottom: 4px; }
    .signup-sub { font-size: 13px; font-weight: 300; color: rgba(255,255,255,.65); margin-bottom: 16px; line-height: 1.6; }

    .signup-form.open { display: block; }

    .signup-submit:hover { filter: brightness(1.15); }
    .signup-trigger { background: rgba(255,255,255,.1); border: none; color: #fff; font-family: 'Roboto', sans-serif; font-size: 14px; font-weight: 500; padding: 12px 24px; border-radius: 100px; cursor: pointer; transition: all .15s; }
    .signup-trigger:hover { background: rgba(255,255,255,.2); }

    /* ── FOOTER ── */
    .foot { padding: 20px 20px 30px; text-align: center; }
    .foot-text { font-size: 11px; font-weight: 300; color: #bbb; }

    /* ── ACADEMIC INSIGHT ── */
    .insight-card { background: #fff; border-radius: 12px; padding: 16px; margin-bottom: 10px; }
    .insight-quote { font-size: 13px; font-weight: 400; color: #444; line-height: 1.75; font-style: italic; margin-bottom: 8px; }
    .insight-author { font-size: 12px; font-weight: 600; color: #1B4332; }

      <div class="hdr-wordmark">Radical <span>Love</span></div>

<script>
/* ══════════════════════════════════════════════════════════════════════════════

const RA = ['R\u0101tapu','R\u0101hina','R\u0101t\u016b','R\u0101apa','R\u0101pare','R\u0101mere','R\u0101horoi'];

function renderCard(profile) {
  const now = new Date();
  const dayOfYear = Math.floor((now - new Date(now.getFullYear(),0,0)) / 86400000);
  const q = QUOTES[dayOfYear % QUOTES.length];
  const originLabel = {aotearoa:'Aotearoa',pacific:'Pacific',indigenous:'Indigenous',intl:'International'};

  const topParty = profile.results[0];
  const chosenInfo = profile.chosen !== 'unsure' ? PARTY_KEYS.find(p => p.key === profile.chosen) : null;
  const topInfo = PARTY_KEYS.find(p => p.key === topParty.key);

  // Issue areas for spectrum
  const areas = ['Te Tiriti','\u014Changa','Ture','Taiao','M\u0101tauranga','Rangatahi','Hauora','Whare'];
  const areaScores = {};
  areas.forEach(a => { areaScores[a] = { user: 0, count: 0 }; });
  profile.answers.forEach(ans => {
    const qq = QUESTIONS[ans.qIdx];
    if (areaScores[qq.area] !== undefined) {
      areaScores[qq.area].user += ans.score / 3;
      areaScores[qq.area].count++;
    }
  });

  let h = '';

  // THE CARD
  h += `<div class="card">
    <div class="card-inner">
      <div class="card-top">
        <div class="card-type">Your Political Profile</div>
        <div class="card-level">${profile.answers.length} questions answered</div>
      </div>

      <div class="card-name">Your heart says\u2026</div>
      <div class="card-party" style="color:${topInfo.colour};font-weight:600;font-size:18px;">${topInfo.name} \u2014 ${topParty.pct}% match</div>`;

  // Gap callout if different from chosen
  if (chosenInfo && topParty.key !== profile.chosen) {
    const chosenResult = profile.results.find(r => r.key === profile.chosen);
    h += `<div style="background:rgba(233,69,96,.15);border-radius:8px;padding:10px 12px;margin-bottom:14px;">
      <div style="font-size:12px;font-weight:400;color:rgba(255,255,255,.85);line-height:1.5;">You picked <strong>${chosenInfo.name}</strong> (${chosenResult.pct}%) but your answers say <strong style="color:${topInfo.colour}">${topInfo.name}</strong>. That\u2019s interesting, not wrong.</div>
    </div>`;
  }

  // Daily quote inside card
  h += `<div style="border-top:1px solid rgba(255,255,255,.1);padding-top:12px;margin-bottom:14px;">
    <div style="font-size:9px;font-weight:500;letter-spacing:2px;color:#E94560;text-transform:uppercase;margin-bottom:6px;">K\u014drero o te R\u0101</div>
    <div class="card-quote">\u201C${q.q}\u201D</div>
    <div class="card-quote-attr">\u2014 ${q.a} \u00B7 <span style="color:rgba(255,255,255,.3);">${originLabel[q.origin]}</span></div>
  </div>`;

  // Issue spectrum
  h += `<div style="border-top:1px solid rgba(255,255,255,.1);padding-top:12px;">
    <div style="font-size:9px;font-weight:500;letter-spacing:2px;color:rgba(255,255,255,.4);text-transform:uppercase;margin-bottom:10px;">Your Issue Map</div>
    <div class="card-spectrum">`;

  areas.forEach(area => {
    const data = areaScores[area];
    if (data.count === 0) return;
    const userPct = Math.round((data.user / data.count) * 100);
    // Find which party is closest on this issue
    let bestParty = null; let bestDiff = 999;
    PARTY_KEYS.forEach(pk => {
      let partyTotal = 0; let partyCount = 0;
      profile.answers.forEach(ans => {
        const qq = QUESTIONS[ans.qIdx];
        if (qq.area === area) { partyTotal += qq.scores[pk.key] / 3; partyCount++; }
      });
      if (partyCount > 0) {
        const diff = Math.abs((partyTotal / partyCount) - (data.user / data.count));
        if (diff < bestDiff) { bestDiff = diff; bestParty = pk; }
      }
    });

    h += `<div class="card-spec-row">
      <div class="card-spec-label">${area}</div>
      <div class="card-spec-track">
        <div class="card-spec-fill" style="width:${userPct}%;background:${bestParty ? bestParty.colour : '#E94560'};border-radius:100px;"></div>
      </div>
      <div style="font-size:10px;color:${bestParty ? bestParty.colour : '#E94560'};font-weight:600;width:28px;text-align:right;">${userPct}%</div>
    </div>`;
  });
  h += `</div></div>`;

  // Party overlap list
  h += `<div class="card-overlap">
    <div class="card-overlap-title">You overlap with</div>`;
  profile.results.forEach(r => {
    const info = PARTY_KEYS.find(p => p.key === r.key);
    const isChosen = r.key === profile.chosen;
    h += `<div class="card-overlap-row">
      <div class="card-overlap-dot" style="background:${info.colour};"></div>
      <div class="card-overlap-name">${info.name}${isChosen ? ' (your pick)' : ''}</div>
      <div class="card-overlap-pct" style="color:${r.pct >= 60 ? '#2E7D32' : r.pct >= 40 ? '#F9A825' : '#C62828'};">${r.pct}%</div>
    </div>`;
  });
  h += `</div>`;

  h += `</div>`; // card-inner
  h += `<div class="card-footer">
    <div class="card-footer-text">Radical Love \u00B7 ${new Date().toLocaleDateString('en-NZ',{day:'numeric',month:'short',year:'numeric'})}</div>
    <div class="card-footer-text" style="color:#E94560;">Share</div>
  </div>`;
  h += `</div>`; // card

  // CTA buttons below card
  h += `<div class="card-cta">
    <button class="card-cta-btn" onclick="startQuestions()">Answer more questions</button>
    <div class="card-cta-sub">The more you answer, the sharper your card gets</div>
  </div>`;
  h += `<div style="text-align:center;padding-bottom:20px;"><button class="poll-reset" onclick="clearProfile()">Start fresh</button></div>`;

  return h + signupFooter();
}

/* ── POLL STATE ── */
let chosenParty = null;
let currentQ = 0;
let answers = [];

function pickParty(key) {
  chosenParty = key;
  currentQ = 0;
  answers = [];
  document.getElementById('poll-step1').style.display = 'none';
  showQuestion();
}

function startQuestions() {
  const saved = localStorage.getItem('rl_profile');
  if (saved) {
    const profile = JSON.parse(saved);
    chosenParty = profile.chosen;
    answers = profile.answers;
    currentQ = answers.length < QUESTIONS.length ? answers.length : 0;
    if (currentQ >= QUESTIONS.length) { currentQ = 0; answers = []; }
  }
  const scr = document.getElementById('scr');
  scr.innerHTML = `<div class="sec" id="poll-step2"></div>` + signupFooter();
  showQuestion();
}

function showQuestion() {
  const container = document.getElementById('poll-step2');
  container.style.display = 'block';
  const q = QUESTIONS[currentQ];
  const progress = `${currentQ + 1} of ${QUESTIONS.length}`;

  let h = `<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;">
    <div class="lbl" style="margin-bottom:0;">${q.area}</div>
    <div style="font-size:11px;font-weight:500;color:#aaa;">${progress}</div>
  </div>`;

  const pct = ((currentQ) / QUESTIONS.length) * 100;
  h += `<div style="height:4px;background:#f0ede8;border-radius:100px;margin-bottom:20px;overflow:hidden;">
    <div style="height:100%;width:${pct}%;background:#E94560;border-radius:100px;transition:width .3s;"></div>
  </div>`;

  h += `<div style="font-size:17px;font-weight:400;color:#222;line-height:1.6;margin-bottom:24px;">\u201C${q.q}\u201D</div>`;

  h += `<div style="display:flex;gap:8px;margin-bottom:16px;">
    <button class="poll-go" style="flex:1;background:#2E7D32;" onclick="answerQ(3)">Agree</button>
    <button class="poll-go" style="flex:1;background:#888;" onclick="answerQ(1)">Unsure</button>
    <button class="poll-go" style="flex:1;background:#C62828;" onclick="answerQ(0)">Disagree</button>
  </div>`;

  container.innerHTML = h;
  document.getElementById('scr').scrollTop = 0;
}

function answerQ(score) {
  const q = QUESTIONS[currentQ];
  answers.push({ qIdx: currentQ, score });

  const container = document.getElementById('poll-step2');

  let h = `<div style="font-size:15px;font-weight:400;color:#555;line-height:1.6;margin-bottom:14px;font-style:italic;">\u201C${q.q}\u201D</div>`;

  const answerLabel = score === 3 ? 'You agreed' : score === 0 ? 'You disagreed' : 'You were unsure';
  const answerCol = score === 3 ? '#2E7D32' : score === 0 ? '#C62828' : '#888';
  h += `<div style="font-size:13px;font-weight:600;color:${answerCol};margin-bottom:14px;">${answerLabel}</div>`;

  h += `<div style="background:#F0FFF4;border-radius:10px;padding:14px;margin-bottom:16px;border-left:3px solid #2E7D32;">
    <div style="font-size:11px;font-weight:600;letter-spacing:1px;color:#2E7D32;text-transform:uppercase;margin-bottom:6px;">Did you consider?</div>
    <div style="font-size:13px;font-weight:400;color:#333;line-height:1.75;">${q.consider}</div>
  </div>`;

  if (chosenParty && chosenParty !== 'unsure') {
    const partyInfo = PARTY_KEYS.find(p => p.key === chosenParty);
    const partyScore = q.scores[chosenParty];
    const partyStance = partyScore === 3 ? 'supports this' : partyScore === 2 ? 'partially supports this' : partyScore === 1 ? 'is unclear on this' : 'opposes this';
    const partyCol = partyScore >= 2 ? '#2E7D32' : partyScore === 1 ? '#F9A825' : '#C62828';
    const match = (score >= 2 && partyScore >= 2) || (score === 0 && partyScore === 0);

    h += `<div style="background:#fff;border-radius:10px;padding:14px;margin-bottom:16px;">
      <div style="font-size:13px;font-weight:400;color:#555;line-height:1.6;">
        <strong style="color:${partyInfo.colour}">${partyInfo.name}</strong> <span style="color:${partyCol};font-weight:500;">${partyStance}</span>.
        ${match ? '<span style="color:#2E7D32;"> You\u2019re aligned here.</span>' : '<span style="color:#C62828;"> That\u2019s a gap.</span>'}
      </div>
    </div>`;
  }

  const isLast = currentQ >= QUESTIONS.length - 1;
  h += `<button class="poll-go" onclick="${isLast ? 'finishPoll()' : 'nextQ()'}">${isLast ? 'See your card' : 'Next question'}</button>`;

  container.innerHTML = h;
  document.getElementById('scr').scrollTop = 0;
}

function nextQ() {
  currentQ++;
  showQuestion();
}

function finishPoll() {
  // Calculate results
  const results = PARTY_KEYS.map(p => {
    let total = 0; let max = 0;
    answers.forEach(a => {
      const q = QUESTIONS[a.qIdx];
      total += 1 - Math.abs((a.score / 3) - (q.scores[p.key] / 3));
      max += 1;
    });
    return { key: p.key, pct: max > 0 ? Math.round((total / max) * 100) : 0 };
  });
  results.sort((a, b) => b.pct - a.pct);

  // Save profile
  const profile = { chosen: chosenParty, answers, results, date: new Date().toISOString() };
  localStorage.setItem('rl_profile', JSON.stringify(profile));

  // Re-render as card
  const tabs = document.querySelectorAll('.tab');
  go(0, tabs[0]);
}

function clearProfile() {
  localStorage.removeItem('rl_profile');
  chosenParty = null; currentQ = 0; answers = [];
  const tabs = document.querySelectorAll('.tab');
  go(0, tabs[0]);
}

function resetPoll() { clearProfile(); }

/* ══════════════════════════════════════════════════════════════════════════════
 * APP LOGIC
 * ══════════════════════════════════════════════════════════════════════════════ */

const views = [pollView, learnView, watchMergedView];

function go(i, el) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('on'));
  el.classList.add('on');
  const scr = document.getElementById('scr');
  scr.innerHTML = views[i]();
  scr.scrollTop = 0;
  if (i === 2) fetchReleases();
}

function toggleTk(i) {
  document.getElementById(`tk-body-${i}`).classList.toggle('open');
  document.getElementById(`tk-arrow-${i}`).classList.toggle('open');
}

function toggleGuide(i) {
  document.getElementById(`guide-body-${i}`).classList.toggle('open');
  document.getElementById(`guide-arrow-${i}`).classList.toggle('open');
}

async function shareCard(type, id) {
  // Try native share with file (mobile)
  if (navigator.share && navigator.canShare) {
    try {
      const res = await fetch(`/api/generate-card?type=${type}&id=${id}`);
      if (res.ok) {
        const blob = await res.blob();
        const file = new File([blob], `radical-love-${type}-${id}.png`, {type:'image/png'});
        if (navigator.canShare({files:[file]})) {
          await navigator.share({files:[file], title:'Radical Love'});
          return;
        }
      }
    } catch {}
  }
  // Fallback: canvas card
  generateCanvasCard(type, id);
}

function generateCanvasCard(type, id) {
  const c = document.createElement('canvas');
  c.width = 1080; c.height = 1080;
  const ctx = c.getContext('2d');

  // BG gradient
  const grad = ctx.createLinearGradient(0,0,1080,1080);
  grad.addColorStop(0,'#1a1a2e'); grad.addColorStop(1,'#16213e');
  ctx.fillStyle = grad; ctx.fillRect(0,0,1080,1080);

  // Wordmark
  ctx.fillStyle = '#E94560';
  ctx.font = '700 28px Roboto, sans-serif';
  ctx.fillText('RADICAL LOVE', 60, 80);

  ctx.fillStyle = '#333'; ctx.fillRect(60, 100, 960, 1);

  let title='', body='', source='';
  if (type==='quote') {
    const q = QUOTES[parseInt(id)%QUOTES.length];
    body = `\u201C${q.q}\u201D`;
    source = `\u2014 ${q.a}\n${q.src}`;
  } else if (type==='talking-point') {
    const tp = TALKING_POINTS.find(t=>t.id===id);
    if(tp){title=tp.topic.toUpperCase();body=tp.keyStat;source=`${tp.keyStatCtx}\n\nSource: ${tp.source}`;}
  } else if (type==='bill') {
    const b = SEED_BILLS.find(x=>x.id===id);
    if(b){title='BILL ALERT';body=b.name;source=b.summary;}
  } else if (type==='tiriti') {
    title='TE TIRITI O WAITANGI'; body='Know Your Rights'; source='radicallove.nz';
  } else if (type==='party') {
    const p = PARTIES.find(x=>x.name.replace(/\s+/g,'-').toLowerCase()===id);
    if(p){title='PARTY SCORECARD';body=`${p.name}: ${p.score}/10`;source=p.source;}
  }

  if(title){ctx.fillStyle='#E94560';ctx.font='600 18px Roboto,sans-serif';ctx.fillText(title,60,170);}

  ctx.fillStyle='#fff';
  if(type==='talking-point'){ctx.font='300 120px Roboto,sans-serif';ctx.fillText(body,60,420);}
  else{ctx.font='300 36px Roboto,sans-serif';wrapText(ctx,body,60,280,960,52);}

  ctx.fillStyle='rgba(255,255,255,0.55)';ctx.font='300 20px Roboto,sans-serif';
  let sy=880; source.split('\n').forEach(l=>{wrapText(ctx,l,60,sy,960,28);sy+=30;});

  ctx.fillStyle='rgba(255,255,255,0.3)';ctx.font='400 16px Roboto,sans-serif';ctx.fillText('radicallove.nz',60,1040);

  c.toBlob(blob=>{
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');a.href=url;a.download=`radical-love-${type}-${id}.png`;a.click();
    URL.revokeObjectURL(url);
  },'image/png');
}

function wrapText(ctx,text,x,y,maxW,lh){
  const words=text.split(' ');let line='';
  for(let n=0;n<words.length;n++){
    const t=line+words[n]+' ';
    if(ctx.measureText(t).width>maxW&&n>0){ctx.fillText(line.trim(),x,y);line=words[n]+' ';y+=lh;}
    else line=t;
  }
  ctx.fillText(line.trim(),x,y);
}

async function fetchReleases() {
  const el = document.getElementById('releases-list');
  if(!el) return;
  try {
    const res = await fetch('/api/bills');
    if(!res.ok) throw 0;
    const data = await res.json();
    if(data.releases&&data.releases.length>0){
      el.innerHTML = data.releases.slice(0,5).map(r =>
        `<div style="padding:12px 16px;background:#fff;border-radius:10px;margin-bottom:8px;">
          <a href="${r.link}" target="_blank" rel="noopener" style="font-size:14px;font-weight:500;color:#222;text-decoration:none;line-height:1.4;display:block;">${r.title} \u2197</a>
          <div style="font-size:11px;font-weight:400;color:#aaa;margin-top:4px;">${new Date(r.pubDate).toLocaleDateString('en-NZ',{day:'numeric',month:'short',year:'numeric'})}</div>
        </div>`
      ).join('');
    } else {
      el.textContent = 'No releases right now \u2014 check back later.';
    }
  } catch {
    el.textContent = 'Could not load releases. You may be offline.';
  }
}

function toggleSignup() {
  document.getElementById('signup-form').classList.toggle('open');
  document.getElementById('signup-trigger').style.display = 'none';
}

async function submitSignup(e) {
  e.preventDefault();
  const f=e.target, name=f.querySelector('[name=name]').value, email=f.querySelector('[name=email]').value, btn=f.querySelector('.signup-submit');
  btn.textContent='Sending\u2026'; btn.disabled=true;
  try {
    const res = await fetch('/api/subscribe',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name,email})});
    const data = await res.json();
    if(data.ok||data.existing) document.getElementById('signup-area').innerHTML='<div class="signup-ok">Nau mai! You\u2019re in \u{1F496}</div>';
    else{btn.textContent='Try again';btn.disabled=false;}
  } catch{btn.textContent='Try again';btn.disabled=false;}
}

function setDate() {
  const now=new Date();
  const eng = now.toLocaleDateString('en-NZ',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
  document.getElementById('hdr-date').textContent = `${RA[now.getDay()]}, ${now.getDate()} ${MARAMA[now.getMonth()]} \u00B7 ${eng}`;
}

document.addEventListener('DOMContentLoaded', () => {
  try { setDate(); } catch(e) {}
  document.getElementById('scr').innerHTML = pollView();
  if('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js').catch(()=>{});
});
// Fallback if DOMContentLoaded already fired
if (document.readyState !== 'loading') {
  try { setDate(); } catch(e) {}
  const scr = document.getElementById('scr');
  if (scr && !scr.innerHTML) scr.innerHTML = pollView();
}
